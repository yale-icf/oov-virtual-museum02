<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Origins of Value Virtual Museum</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auth.js"></script>
</head>
<body>

  <header class="site-header">
    <h1><a href="index.html">Origins of <span>Value</span></a></h1>
    <nav class="header-nav">
      <a href="collection.html" class="header-nav-link">Collection</a>
      <a href="gallery.html" class="header-nav-link active">Gallery</a>
      <a href="map.html" class="header-nav-link">Map</a>
      <a href="exhibits.html" class="header-nav-link">Exhibits</a>
      <a href="search.html" class="header-nav-link">Text Search</a>
    </nav>
  </header>

  <div class="page-banner">
    <div class="page-banner-inner">
      <h2>Gallery</h2>
      <p>Browse 545 documents from the collection</p>
    </div>
  </div>

  <!-- Combined search + filter bar -->
  <div class="coll-filter-bar gallery-filter-bar" id="gallery-filter-bar">
    <div class="coll-filter-bar-inner gallery-filter-bar-inner">
      <div class="gallery-search-wrap">
        <svg class="gallery-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7.5"/>
          <path d="m20 20-4.5-4.5" stroke-linecap="round"/>
        </svg>
        <input class="gallery-search-input" type="text" id="search-input"
               placeholder="Search titles, descriptions, keywords&hellip;" autocomplete="off">
      </div>
      <div class="gallery-filter-divider"></div>
      <button class="coll-filter-btn" data-filter="period">
        Period
        <svg class="coll-chevron" viewBox="0 0 12 8" fill="none" aria-hidden="true">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="coll-filter-btn" data-filter="issuingCountry">
        Country
        <svg class="coll-chevron" viewBox="0 0 12 8" fill="none" aria-hidden="true">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="coll-filter-btn" data-filter="type">
        Type
        <svg class="coll-chevron" viewBox="0 0 12 8" fill="none" aria-hidden="true">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="coll-filter-btn" data-filter="language">
        Language
        <svg class="coll-chevron" viewBox="0 0 12 8" fill="none" aria-hidden="true">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="gallery-result-count" id="result-count"></span>
    </div>
    <div class="coll-dropdown" id="dropdown-period"></div>
    <div class="coll-dropdown" id="dropdown-issuingCountry"></div>
    <div class="coll-dropdown" id="dropdown-type"></div>
    <div class="coll-dropdown" id="dropdown-language"></div>
  </div>

  <!-- Active filter chips -->
  <div class="coll-chips-row" id="gallery-chips-row">
    <div class="coll-chips" id="active-filters"></div>
    <button class="coll-clear-btn" id="clear-filters">Clear all</button>
  </div>

  <main class="gallery-main">
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="pagination" id="pagination"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <h2>No documents found</h2>
      <p>Try adjusting your search or filters.</p>
    </div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>
  </main>

  <script src="js/app.js"></script>

  <footer class="site-footer">
    <p>&copy; Yale School of Management &mdash; International Center for Finance</p>
  </footer>
</body>
</html>
