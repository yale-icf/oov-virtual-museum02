<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - Origins of Value Virtual Museum</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auth.js"></script>
</head>
<body>

  <header class="site-header">
    <h1><a href="index.html">Origins of <span>Value</span></a></h1>
    <nav class="header-nav">
      <a href="collection.html" class="header-nav-link">Collection</a>
      <a href="gallery.html" class="header-nav-link active">Search</a>
      <a href="map.html" class="header-nav-link">Map</a>
      <a href="exhibits.html" class="header-nav-link">Exhibits</a>
      <a href="search.html" class="header-nav-link">Text Search</a>
    </nav>
  </header>

  <div class="search-container">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search titles, descriptions, keywords..." autocomplete="off">
    </div>
    <span class="result-count" id="result-count"></span>
  </div>

  <div class="main-content">
    <aside class="sidebar" id="sidebar">
      <div class="filter-section" data-filter="period">
        <h3>Period</h3>
        <div class="filter-options" id="filter-period"></div>
      </div>
      <div class="filter-section" data-filter="issuingCountry">
        <h3>Issuing Country</h3>
        <div class="filter-options" id="filter-issuingCountry"></div>
      </div>
      <div class="filter-section" data-filter="type">
        <h3>Document Type</h3>
        <div class="filter-options" id="filter-type"></div>
      </div>
      <div class="filter-section" data-filter="language">
        <h3>Language</h3>
        <div class="filter-options" id="filter-language"></div>
      </div>
      <button class="clear-filters" id="clear-filters">Clear All Filters</button>
    </aside>

    <main class="gallery-container">
      <div class="active-filters" id="active-filters"></div>
      <div class="gallery-grid" id="gallery-grid"></div>
      <div class="pagination" id="pagination"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <h2>No documents found</h2>
        <p>Try adjusting your search or filters.</p>
      </div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>

  <footer class="site-footer">
    <p>&copy; Yale School of Management &mdash; International Center for Finance</p>
  </footer>
</body>
</html>
