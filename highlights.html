<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection Highlights - Origins of Value Virtual Museum</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auth.js"></script>
</head>
<body>

  <header class="site-header">
    <h1><a href="index.html">Origins of <span>Value</span></a></h1>
    <nav class="header-nav">
      <a href="collection.html" class="header-nav-link active">Collection</a>
      <div class="nav-dropdown">
        <a href="gallery.html" class="header-nav-link nav-dropdown-toggle">Search</a>
        <div class="nav-dropdown-menu">
          <a href="gallery.html" class="nav-dropdown-item">Search</a>
          <a href="search.html" class="nav-dropdown-item">Text Search</a>
        </div>
      </div>
      <a href="map.html" class="header-nav-link">Map</a>
      <a href="exhibits.html" class="header-nav-link">Exhibits</a>
    </nav>
  </header>

  <div class="page-banner">
    <div class="page-banner-inner">
      <h2>Collection Highlights</h2>
      <p>A selection of notable documents from the Origins of Value collection</p>
    </div>
  </div>

  <section class="highlights-main">
    <div class="highlights-grid" id="highlights-grid"></div>
  </section>

  <footer class="site-footer">
    <p>&copy; Yale School of Management &mdash; International Center for Finance</p>
  </footer>

  <script>
    (function () {
      var HIGHLIGHTS = [
        {
          id: 'goetzmann1021',
          title: 'Dutch East India Company (VOC) \u2013 Middelburg Chamber Obligation Receipts, 1622\u20131623',
          period: '17th Century',
          location: 'Netherlands'
        },
        {
          id: 'goetzmann0302',
          title: 'Banque Industrielle de Chine, 500 Franc Share',
          period: '20th Century',
          location: 'China'
        },
        {
          id: 'goetzmann0028',
          title: 'Temple Mills (South Sea Bubble Playing Card, King of Diamonds)',
          period: '18th Century',
          location: 'Great Britain'
        }
      ];

      function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      var grid = document.getElementById('highlights-grid');
      HIGHLIGHTS.forEach(function (item) {
        var card = document.createElement('a');
        card.className = 'featured-card';
        card.href = 'viewer.html?id=' + encodeURIComponent(item.id);
        card.innerHTML =
          '<div class="featured-card-image">' +
            '<img src="thumbnails/' + item.id + '.jpg" alt="' + escapeHtml(item.title) + '" loading="lazy">' +
          '</div>' +
          '<div class="featured-card-body">' +
            '<h3 class="featured-card-title">' + escapeHtml(item.title) + '</h3>' +
            '<p class="featured-card-meta">' + escapeHtml(item.period) + ' &mdash; ' + escapeHtml(item.location) + '</p>' +
          '</div>';
        grid.appendChild(card);
      });
    })();
  </script>

</body>
</html>
