<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection - Origins of Value Virtual Museum</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auth.js"></script>
</head>
<body>

  <header class="site-header">
    <h1><a href="index.html">Origins of <span>Value</span> Virtual Museum</a></h1>
    <nav class="header-nav">
      <a href="collection.html" class="header-nav-link active">Search</a>
      <a href="gallery.html" class="header-nav-link">Gallery</a>
      <a href="map.html" class="header-nav-link">Map</a>
      <a href="exhibits.html" class="header-nav-link">Exhibits</a>
    </nav>
  </header>

  <!-- Hero: parchment bg, decorative bracket + title + search -->
  <div class="coll-hero">
    <div class="coll-hero-inner">
      <svg class="coll-bracket" viewBox="0 0 48 130" fill="none" aria-hidden="true">
        <path d="M42 8 L8 65 L42 122" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="coll-hero-content">
        <h2 class="coll-title">Search the Collection</h2>
        <form class="coll-search-form" id="coll-search-form">
          <input class="coll-search-input" id="coll-search-input"
                 type="text" placeholder="" autocomplete="off">
          <button class="coll-search-btn" type="submit" aria-label="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
              <circle cx="11" cy="11" r="7.5"/>
              <path d="m20 20-4.5-4.5" stroke-linecap="round"/>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Sticky filter bar -->
  <div class="coll-filter-bar" id="coll-filter-bar">
    <div class="coll-filter-bar-inner">
      <button class="coll-filter-btn" data-filter="type">
        Type
        <svg class="coll-chevron" viewBox="0 0 12 8" fill="none" aria-hidden="true">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="coll-filter-btn" data-filter="period">
        Period
        <svg class="coll-chevron" viewBox="0 0 12 8" fill="none" aria-hidden="true">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="coll-filter-btn" data-filter="location">
        Country
        <svg class="coll-chevron" viewBox="0 0 12 8" fill="none" aria-hidden="true">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="coll-filter-btn" data-filter="namedIndividuals">
        Named Individual
        <svg class="coll-chevron" viewBox="0 0 12 8" fill="none" aria-hidden="true">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <!-- Dropdown panels (absolutely positioned below filter bar) -->
    <div class="coll-dropdown" id="dropdown-type"></div>
    <div class="coll-dropdown" id="dropdown-period"></div>
    <div class="coll-dropdown" id="dropdown-location"></div>
    <div class="coll-dropdown" id="dropdown-namedIndividuals"></div>
  </div>

  <!-- Active filter chips -->
  <div class="coll-chips-row" id="coll-chips-row">
    <div class="coll-chips" id="coll-chips"></div>
    <button class="coll-clear-btn" id="coll-clear-btn">Clear all</button>
  </div>

  <!-- Results -->
  <main class="coll-main" id="coll-main">
    <div class="coll-results-bar">
      <p class="coll-tagline" id="coll-tagline">&nbsp;</p>
      <select class="coll-sort" id="coll-sort" aria-label="Sort results">
        <option value="default">Sort: Default</option>
        <option value="title">Title A–Z</option>
        <option value="period-asc">Period: Earliest first</option>
        <option value="period-desc">Period: Latest first</option>
      </select>
    </div>

    <div class="coll-grid" id="coll-grid">
      <div class="loading"><div class="spinner"></div></div>
    </div>

    <div class="coll-pagination" id="coll-pagination"></div>
  </main>

  <script src="js/collection.js"></script>

  <footer class="site-footer">
    <p>&copy; Yale School of Management &mdash; International Center for Finance</p>
  </footer>
</body>
</html>
